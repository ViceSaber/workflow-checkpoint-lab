name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  task-kanban:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-kanban
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: task-kanban/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
